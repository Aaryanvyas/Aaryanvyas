<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="850" height="320">
  <defs>
    <!-- Color Gradients -->
    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <linearGradient id="neon-cyan-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d8b4fe" />
    </linearGradient>

    <linearGradient id="glass-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.2" />
    </linearGradient>

    <!-- Radial Glows for Ambient Backlight -->
    <radialGradient id="purple-glow" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#701a88" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#06020f" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="cyan-glow" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#06020f" stop-opacity="0" />
    </radialGradient>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />
    </pattern>

    <!-- Glow Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="heavy-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Stylesheet for typography and animation -->
  <style>
    .name-title {
      font-family: 'Outfit', 'Segoe UI', -apple-system, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: url(#text-gradient);
      letter-spacing: 2px;
    }
    .subtitle {
      font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      fill: #00f0ff;
      letter-spacing: 4px;
    }
    .tagline {
      font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
      font-weight: 300;
      font-size: 13px;
      fill: #94a3b8;
      letter-spacing: 0.5px;
    }
    .badge-text {
      font-family: 'Outfit', 'Segoe UI', -apple-system, sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: #ffffff;
      letter-spacing: 1px;
    }
    .wireframe {
      stroke: url(#neon-cyan-purple);
      stroke-width: 1.5px;
      fill: none;
      opacity: 0.25;
    }
    .pulse-glow {
      animation: pulse 4s infinite alternate ease-in-out;
    }
    @keyframes pulse {
      0% { opacity: 0.3; transform: scale(0.98); }
      100% { opacity: 0.6; transform: scale(1.02); }
    }
  </style>

  <!-- 1. Deep Space Base Background -->
  <rect width="100%" height="100%" fill="#06020f" />

  <!-- 2. Ambient Glow Blobs -->
  <circle cx="150" cy="100" r="180" fill="#a855f7" filter="url(#heavy-blur)" opacity="0.4" />
  <circle cx="700" cy="220" r="150" fill="#00f0ff" filter="url(#heavy-blur)" opacity="0.3" />
  <circle cx="450" cy="160" r="100" fill="#ff007f" filter="url(#heavy-blur)" opacity="0.2" />

  <!-- 3. Tech Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- 4. Modern Abstract Sci-Fi Wireframes (Right Side) -->
  <g transform="translate(620, 160)">
    <!-- Floating orbital rings -->
    <ellipse cx="0" cy="0" rx="90" ry="35" class="wireframe" transform="rotate(-15)" />
    <ellipse cx="0" cy="0" rx="120" ry="45" class="wireframe" transform="rotate(25)" />
    <ellipse cx="0" cy="0" rx="60" ry="22" class="wireframe" transform="rotate(-45)" />
    <circle cx="-30" cy="-10" r="4" fill="#00f0ff" filter="url(#soft-glow)" />
    <circle cx="40" cy="20" r="3" fill="#ff007f" filter="url(#soft-glow)" />
    <circle cx="10" cy="-35" r="5" fill="#a855f7" filter="url(#soft-glow)" />
  </g>

  <!-- 5. Left Accent Glowing Strip -->
  <rect x="0" y="0" width="6" height="320" fill="url(#cyber-gradient)" filter="url(#neon-glow)" />

  <!-- 6. Main Glassmorphic Panel (Centered-Left) -->
  <g transform="translate(45, 40)">
    <!-- Card Glass Background -->
    <rect width="520" height="240" rx="16" fill="#110726" fill-opacity="0.45" stroke="url(#glass-border)" stroke-width="1.5" />
    
    <!-- Decorative mini dots for grid pattern inside card -->
    <circle cx="30" cy="30" r="2.5" fill="#a855f7" opacity="0.7" />
    <circle cx="45" cy="30" r="2.5" fill="#00f0ff" opacity="0.7" />
    <circle cx="60" cy="30" r="2.5" fill="#ff007f" opacity="0.7" />

    <!-- Name and Subtitle Text -->
    <text x="30" y="85" class="name-title" filter="url(#soft-glow)">AARYAN VYAS</text>
    <text x="32" y="115" class="subtitle">FULL-STACK DEVELOPER</text>
    
    <!-- Decorative Glowing Underline -->
    <line x1="32" y1="128" x2="280" y2="128" stroke="url(#neon-cyan-purple)" stroke-width="2" filter="url(#soft-glow)" />

    <!-- Detailed Sub-lines / Features -->
    <text x="32" y="158" class="tagline">✦ Crafting premium, interactive &amp; modern user interfaces</text>
    <text x="32" y="178" class="tagline">✦ Architecting scalable, robust full-stack web applications</text>
    <text x="32" y="198" class="tagline">✦ Passionate about aesthetics, performance, and clean code</text>

    <!-- Mini status badges -->
    <g transform="translate(32, 215)">
      <!-- Badge 1: Open to Work -->
      <rect width="105" height="22" rx="11" fill="rgba(16, 185, 129, 0.15)" stroke="#10b981" stroke-width="1" />
      <circle cx="12" cy="11" r="3.5" fill="#10b981" />
      <text x="24" y="15" class="badge-text" fill="#34d399">AVAILABLE</text>
    </g>
    
    <g transform="translate(147, 215)">
      <!-- Badge 2: Tech Explorer -->
      <rect width="90" height="22" rx="11" fill="rgba(6, 182, 212, 0.15)" stroke="#06b6d4" stroke-width="1" />
      <circle cx="12" cy="11" r="3.5" fill="#06b6d4" />
      <text x="24" y="15" class="badge-text" fill="#22d3ee">CREATIVE</text>
    </g>

    <g transform="translate(247, 215)">
      <!-- Badge 3: Designer -->
      <rect width="95" height="22" rx="11" fill="rgba(168, 85, 247, 0.15)" stroke="#a855f7" stroke-width="1" />
      <circle cx="12" cy="11" r="3.5" fill="#a855f7" />
      <text x="24" y="15" class="badge-text" fill="#c084fc">DESIGNER</text>
    </g>
  </g>

  <!-- Decor elements: floating particles on the left -->
  <circle cx="50" cy="290" r="1.5" fill="#00f0ff" opacity="0.5" />
  <circle cx="180" cy="20" r="2" fill="#a855f7" opacity="0.6" />
  <circle cx="340" cy="15" r="1" fill="#ffffff" opacity="0.3" />
  <rect x="580" y="40" width="3" height="3" fill="#ff007f" opacity="0.4" transform="rotate(45 580 40)" />
  <rect x="790" y="90" width="4" height="4" fill="#00f0ff" opacity="0.3" transform="rotate(15 790 90)" />
</svg>
